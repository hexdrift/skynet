apiVersion: v1
kind: Service
metadata:
  name: {{ include "skynet.backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skynet.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  {{- with .Values.backend.service.sessionAffinity }}
  sessionAffinity: {{ . }}
  {{- end }}
  {{- if and (eq (.Values.backend.service.sessionAffinity | default "") "ClientIP") .Values.backend.service.sessionAffinityTimeoutSeconds }}
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ .Values.backend.service.sessionAffinityTimeoutSeconds }}
  {{- end }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "skynet.backend.selectorLabels" . | nindent 4 }}
