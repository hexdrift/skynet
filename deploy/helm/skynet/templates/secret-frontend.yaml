{{- if not .Values.frontend.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "skynet.frontend.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skynet.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  {{- /* AUTH_SECRET defaults to a generated value if unset, so SSO sessions still work. */ -}}
  {{- $authSecret := .Values.frontend.secrets.data.AUTH_SECRET -}}
  {{- if not $authSecret -}}
    {{- $authSecret = randAlphaNum 48 -}}
  {{- end }}
  AUTH_SECRET: {{ $authSecret | quote }}
  {{- range $key, $val := .Values.frontend.secrets.data }}
  {{- if and (ne $key "AUTH_SECRET") $val }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
{{- end }}
