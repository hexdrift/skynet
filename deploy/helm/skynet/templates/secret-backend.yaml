{{- if not .Values.backend.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "skynet.backend.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skynet.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- /*
    keep this Secret across helm uninstall when postgres data persists, so the
    composed REMOTE_DB_URL (with the bundled-postgres password baked in) stays
    in sync after upgrades.
  */}}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{- /*
    REMOTE_DB_URL composition rules:
      - explicit override wins
      - external DB with composeUrl=true: compose from values
      - external DB with existingSecret: skip (caller supplies via envFrom)
      - bundled postgres: REMOTE_DB_URL is composed AT RUNTIME inside the
        backend container via envsubst-style env interpolation, so the
        password lives only in the postgres Secret. See deployment-backend.yaml.
  */ -}}
  {{- $explicitDbUrl := .Values.backend.secrets.data.REMOTE_DB_URL -}}
  {{- if $explicitDbUrl }}
  REMOTE_DB_URL: {{ $explicitDbUrl | quote }}
  {{- else if and .Values.externalDatabase.enabled .Values.externalDatabase.composeUrl (not .Values.externalDatabase.existingSecret) .Values.externalDatabase.password }}
  REMOTE_DB_URL: {{ printf "postgresql://%s:%s@%s:%v/%s?sslmode=%s"
      .Values.externalDatabase.user
      .Values.externalDatabase.password
      .Values.externalDatabase.host
      .Values.externalDatabase.port
      .Values.externalDatabase.database
      .Values.externalDatabase.sslmode | quote }}
  {{- end }}
  {{- range $key, $val := .Values.backend.secrets.data }}
  {{- if and (ne $key "REMOTE_DB_URL") $val }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
{{- end }}
