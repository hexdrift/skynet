{{- if .Values.networkPolicy.enabled }}
---
# Frontend → Backend ingress + OpenShift router ingress (port 8000).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skynet.backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skynet.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  podSelector:
    matchLabels:
      {{- include "skynet.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "skynet.frontend.selectorLabels" . | nindent 14 }}
        # OpenShift router pods (allows external traffic via Route).
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/ingress: ""
      ports:
        - protocol: TCP
          port: {{ .Values.backend.containerPort }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.pgbouncer.enabled }}
    # PgBouncer transaction pooler.
    - to:
        - podSelector:
            matchLabels:
              {{- include "skynet.pgbouncer.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.pgbouncer.service.port }}
    {{- else if .Values.postgres.enabled }}
    # In-cluster postgres (when bundled).
    - to:
        - podSelector:
            matchLabels:
              {{- include "skynet.postgres.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port }}
    {{- end }}
    {{- if .Values.networkPolicy.egressCidrs }}
    - to:
        {{- range .Values.networkPolicy.egressCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
    {{- end }}
    {{- range .Values.networkPolicy.dbEgress }}
    # External database egress (default port 5432). Required when
    # postgres.enabled=false and the cluster default-denies egress — otherwise
    # the backend pool can never reach the managed Postgres host.
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
      ports:
        {{- range (.ports | default (list 5432)) }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    {{- range .Values.networkPolicy.llmEgress }}
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
      ports:
        {{- range (.ports | default (list 443)) }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    {{- range .Values.networkPolicy.embeddingEgress }}
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
      ports:
        {{- range (.ports | default (list 443)) }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    {{- range .Values.networkPolicy.ldapEgress }}
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
      ports:
        {{- range (.ports | default (list 636)) }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    {{- if and (not .Values.networkPolicy.egressCidrs) (not .Values.networkPolicy.llmEgress) (not .Values.networkPolicy.embeddingEgress) (not .Values.networkPolicy.ldapEgress) (not .Values.networkPolicy.dbEgress) }}
    # No explicit allowlist configured — fall back to wide-open egress.
    # WARNING: this is NOT air-gapped — backend/frontend pods can reach the
    # public internet. Set networkPolicy.egressCidrs / llmEgress / dbEgress /
    # ldapEgress to lock egress down before declaring an air-gap install done.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
    {{- end }}
---
# Frontend ingress: only OpenShift router (and same-namespace traffic, e.g. health probes).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skynet.frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skynet.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  podSelector:
    matchLabels:
      {{- include "skynet.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/ingress: ""
      ports:
        - protocol: TCP
          port: {{ .Values.frontend.containerPort }}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Backend
    - to:
        - podSelector:
            matchLabels:
              {{- include "skynet.backend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.containerPort }}
    {{- if .Values.networkPolicy.egressCidrs }}
    - to:
        {{- range .Values.networkPolicy.egressCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
    {{- else }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
    {{- end }}
  {{- if .Values.postgres.enabled }}
---
# Postgres ingress: backend pods connect directly unless PgBouncer is enabled.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skynet.postgres.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skynet.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  podSelector:
    matchLabels:
      {{- include "skynet.postgres.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.pgbouncer.enabled }}
        - podSelector:
            matchLabels:
              {{- include "skynet.pgbouncer.selectorLabels" . | nindent 14 }}
        {{- end }}
        - podSelector:
            matchLabels:
              {{- include "skynet.backend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port }}
  {{- end }}
  {{- if .Values.pgbouncer.enabled }}
---
# PgBouncer ingress: backend pods connect here; PgBouncer connects onward to Postgres.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skynet.pgbouncer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skynet.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  podSelector:
    matchLabels:
      {{- include "skynet.pgbouncer.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "skynet.backend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.pgbouncer.service.port }}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "skynet.postgres.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port }}
    {{- end }}
    {{- if .Values.networkPolicy.egressCidrs }}
    - to:
        {{- range .Values.networkPolicy.egressCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
    {{- else if not .Values.postgres.enabled }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
    {{- end }}
  {{- end }}
  {{- if .Values.migration.enabled }}
---
# Migration Job egress. Created as a pre-install/pre-upgrade hook (weight -10)
# so it exists BEFORE the migration Job hook (weight -5) runs. Regular
# NetworkPolicies are applied only after all hooks complete, so on a cluster
# with a cluster-wide default-deny the pre-install Job pod would otherwise be
# selected by no policy at all — unable to resolve DNS or reach the database,
# it hangs until activeDeadlineSeconds and aborts the whole release.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skynet.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skynet.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    # Recreate each run, but do NOT delete on hook-succeeded: a NetworkPolicy
    # "succeeds" the instant it is created, so hook-succeeded would delete it
    # before the weight -5 migration Job runs — leaving the Job unprotected on
    # default-deny clusters. before-hook-creation keeps it present through the
    # Job; it persists afterward (harmless — it only selects migration pods).
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  podSelector:
    matchLabels:
      {{- include "skynet.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: migration
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.postgres.enabled }}
    # In-cluster postgres (bundled).
    - to:
        - podSelector:
            matchLabels:
              {{- include "skynet.postgres.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port }}
    {{- end }}
    {{- range .Values.networkPolicy.dbEgress }}
    # External database egress (default port 5432).
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
      ports:
        {{- range (.ports | default (list 5432)) }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    {{- if .Values.networkPolicy.egressCidrs }}
    - to:
        {{- range .Values.networkPolicy.egressCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
    {{- end }}
    {{- if and (not .Values.networkPolicy.egressCidrs) (not .Values.networkPolicy.dbEgress) (not .Values.postgres.enabled) }}
    # No DB allowlist configured — fall back to wide-open egress so the Job can
    # reach an external database. Set networkPolicy.dbEgress to lock this down.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
    {{- end }}
  {{- end }}
{{- end }}
