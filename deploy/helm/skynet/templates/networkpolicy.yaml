{{- if .Values.networkPolicy.enabled }}
---
# Frontend → Backend ingress + OpenShift router ingress (port 8000).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skynet.backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skynet.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  podSelector:
    matchLabels:
      {{- include "skynet.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "skynet.frontend.selectorLabels" . | nindent 14 }}
        # OpenShift router pods (allows external traffic via Route).
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/ingress: ""
      ports:
        - protocol: TCP
          port: {{ .Values.backend.containerPort }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # In-cluster postgres (when bundled).
    {{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "skynet.postgres.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port }}
    {{- end }}
    {{- if .Values.networkPolicy.egressCidrs }}
    - to:
        {{- range .Values.networkPolicy.egressCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
    {{- end }}
    {{- range .Values.networkPolicy.llmEgress }}
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
      ports:
        {{- range (.ports | default (list 443)) }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    {{- range .Values.networkPolicy.ldapEgress }}
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
      ports:
        {{- range (.ports | default (list 636)) }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    {{- if and (not .Values.networkPolicy.egressCidrs) (not .Values.networkPolicy.llmEgress) (not .Values.networkPolicy.ldapEgress) }}
    # No explicit allowlist configured — fall back to wide-open egress.
    # Set networkPolicy.egressCidrs, llmEgress, and/or ldapEgress to lock down.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
    {{- end }}
---
# Frontend ingress: only OpenShift router (and same-namespace traffic, e.g. health probes).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skynet.frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skynet.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  podSelector:
    matchLabels:
      {{- include "skynet.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/ingress: ""
      ports:
        - protocol: TCP
          port: {{ .Values.frontend.containerPort }}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Backend
    - to:
        - podSelector:
            matchLabels:
              {{- include "skynet.backend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.containerPort }}
    {{- if .Values.networkPolicy.egressCidrs }}
    - to:
        {{- range .Values.networkPolicy.egressCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
    {{- else }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
    {{- end }}
{{- if .Values.postgres.enabled }}
---
# Postgres ingress: only the backend pods may reach it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skynet.postgres.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skynet.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  podSelector:
    matchLabels:
      {{- include "skynet.postgres.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "skynet.backend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.service.port }}
{{- end }}
{{- end }}
