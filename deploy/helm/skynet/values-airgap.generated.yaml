# Generated by scripts/airgap_migrate.sh.
# TODO: On-premise - review every value before installing.
global:
  imageRegistry: "artifactory.your-company.com/skynet"
  imagePullSecrets:
    - name: "artifactory-pull-secret"

backend:
  image:
    repository: "skynet/backend"
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  env:
    # TODO: On-premise - point these at your OpenAI-compatible internal LLM gateway.
    CODE_AGENT_BASE_URL: "https://llm-gateway.internal/v1"
    CODE_AGENT_MODEL: "gpt-5"
    GENERALIST_AGENT_BASE_URL: "https://llm-gateway.internal/v1"
    GENERALIST_AGENT_MODEL: "gpt-5"

    # TODO: On-premise - set to the public frontend route.
    FRONTEND_URL: "https://skynet.apps.internal"
    # TODO: On-premise - list every browser origin allowed to call the backend.
    ALLOWED_ORIGINS: "https://skynet.apps.internal"
    ADMIN_GROUPS: ""
    ADMIN_USERNAMES: ""
    COMMS_WEBHOOK_URL: ""
    # TODO: On-premise - set to enable Active Directory username autocomplete
    # in the admin tab. Leave empty to keep the NullDirectoryClient fallback
    # (DB-known users only). See AIRGAP.md "Internal LDAP / Active Directory
    # User Search" for the full env contract.
    AD_LDAP_URL: ""
    AD_LDAP_BIND_DN: ""
    AD_LDAP_SEARCH_BASE: ""
    AD_LDAP_USER_FILTER: ""
    AD_LDAP_USERNAME_ATTR: ""
  secrets:
    # TODO: On-premise - must contain OPENAI_API_KEY and BACKEND_AUTH_SECRET.
    # Add AD_LDAP_BIND_PASSWORD when AD_LDAP_URL is set.
    existingSecret: "skynet-backend-secrets"


frontend:
  image:
    repository: "skynet/frontend"
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  env:
    API_URL: "https://skynet-api.apps.internal"
    # TODO: On-premise - point at your internal OIDC issuer.
    AUTH_SSO_ISSUER: "https://idp.internal/realms/skynet"
    AUTH_SSO_CLIENT_ID: "skynet"
    AUTH_SSO_SCOPE: "openid profile email groups"
    AUTH_GROUP_CLAIM: "groups"
    AUTH_ADMIN_GROUPS: ""
    AUTH_ADMINS: ""
    # TODO: On-premise - set when your IdP uses a private CA mounted in the pod.
    NODE_EXTRA_CA_CERTS: ""
  secrets:
    # TODO: On-premise - must contain AUTH_SECRET, AUTH_SSO_CLIENT_SECRET, and BACKEND_AUTH_SECRET.
    existingSecret: "skynet-frontend-secrets"


externalDatabase:
  enabled: true
  host: "pgvector.internal"
  port: 5432
  database: skynet
  user: skynet
  existingSecret: "skynet-db-password"
  existingSecretKey: password
  composeUrl: true
  sslmode: require

postgres:
  enabled: false
  image:
    repository: "pgvector/pgvector"
    tag: pg16

openshift:
  routes:
    enabled: true
    backend:
      host: "skynet-api.apps.internal"
    frontend:
      host: "skynet.apps.internal"

networkPolicy:
  enabled: true
  # TODO: On-premise - use the exact IdP / internal service CIDRs for your cluster.
  egressCidrs:
    - "10.0.6.0/24"

  # TODO: On-premise - use the exact LLM gateway CIDRs and ports.
  llmEgress:
    - cidr: "10.0.5.0/24"
      ports: [443]

migration:
  enabled: true
  command: ["alembic", "upgrade", "head"]
