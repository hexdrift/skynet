# Canonical domain terminology shared by frontend and backend copy.
#
# Runtime strings live in i18n/locales/*.json. This file is for translator and
# reviewer context: why a term is written the way it is, what not to use, and
# where directionality needs attention.
#
# Coverage is intentionally selective — only contested terms (borrowings vs.
# native phrasing, model identifiers, anything with a "do_not_use" history)
# get an entry. The full list of terms lives in i18n/locales/he.json under
# the `terms` section; absence here means the term has no translation
# controversy worth documenting.

optimization:
  en: optimization
  he: אופטימיזציה
  note: Top-level user-facing noun. Do not use "job" in Hebrew user copy.
  do_not_use:
    - עבודה
    - ג׳וב

dataset:
  en: dataset
  he: דאטאסט
  note: Borrowing is intentional; do not use the native phrase מערך נתונים.
  do_not_use:
    - מערך נתונים

optimizer:
  en: optimizer
  he: אופטימייזר
  note: Keep the borrowed DSPy term.

module:
  en: module
  he: מודול
  note: Keep the borrowed DSPy term.

metric:
  en: metric
  he: פונקציית מדידה
  note: Owner-approved native exception. Do not use מטריקה in product copy.
  do_not_use:
    - מטריקה

baseline:
  en: baseline
  he: בסיס
  note: Use תוצאות בסיס for the full pre-optimization result phrase.

generationModel:
  en: generation model
  he: מודל מג׳נרט
  note: Singular label for the model that generates task outputs.
  direction: Model identifiers remain LTR in UI.

generationModelPlural:
  en: generation models
  he: מודלי מג׳נרט
  note: Plural form must reuse the מג׳נרט stem from generationModel; do not
    drift to alternatives like ג׳ינרוט.
  direction: Model identifiers remain LTR in UI.

reflectionModel:
  en: reflection model
  he: מודל רפלקציה
  note: GEPA reflection-step model.
  direction: Model identifiers remain LTR in UI.

candidate:
  en: candidate
  he: מועמד
  note: A prompt variant produced by GEPA. The trajectory tree node label.
  do_not_use:
    - אפשרות
    - מועמדות

parent:
  en: parent
  he: הורה
  note: Source candidate the current one was reflected from. Genealogy term.
  do_not_use:
    - אב
    - מקור

generation:
  en: generation
  he: דור
  note: Depth in the parent tree (root = 0). Reuse the family-tree sense.
    Do not confuse with "generation_model" (that stays מודל מג׳נרט).

trajectory:
  en: trajectory
  he: מסלול
  note: The genealogy of accepted candidates over the run. Use as a noun.
  do_not_use:
    - נתיב
    - דרך

paretoFront:
  en: Pareto front
  he: חזית Pareto
  note: Mixed-direction phrase. Pareto stays LTR/Latin, חזית stays RTL.
  direction: Wrap "Pareto" in bdi or a span with dir="ltr".

reflection:
  en: reflection
  he: רפלקציה
  note: The GEPA self-improvement step. Already established in tutorial copy.

prompt:
  en: prompt
  he: פרומפט
  note: Established borrowing across the app. Do not use הנחיה or הוראה.
  do_not_use:
    - הנחיה
    - הוראה

seedCandidate:
  en: seed candidate
  he: מועמד התחלתי
  note: The original prompt that seeds the optimization (always id "0").

winningCandidate:
  en: winning candidate
  he: מועמד מוביל
  note: The best-scoring candidate at any given moment. "מוביל" (leading) not
    "מנצח" (final winner) because the value changes mid-run. Matches winningModel.
