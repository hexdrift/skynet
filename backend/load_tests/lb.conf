# Nginx LB for the load-test stack. The `set $upstream` + variable
# `proxy_pass` pattern forces nginx to re-resolve `api:8000` on every
# request, so Docker's embedded DNS round-robins us across all live
# replicas (and skips a killed one within ~5 s). This is the OSS-nginx
# workaround for what would be `upstream { server api:8000 resolve }`
# under nginx Plus.

resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 80;
    server_name _;

    # SSE endpoints stream forever; disable buffering and bump the read
    # timeout so the dashboard-read scenario can sample real events.
    location ~ ^/optimizations(/.*)?/stream$ {
        set $upstream "http://api:8000";
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 5m;
    }

    location / {
        set $upstream "http://api:8000";
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
