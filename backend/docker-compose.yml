# Skynet — Docker Compose with PostgreSQL
# Usage:
#   cp .env.example .env
#   docker compose up --build
#
# Air-gap operators: set REGISTRY_PREFIX (and DEBIAN_MIRROR / PIP_INDEX_URL
# for the API build) so nothing pulls from public registries. See
# deploy/ON_PREM_CHECKLIST.md.

services:
  db:
    image: ${REGISTRY_PREFIX:-docker.io}/pgvector/pgvector:pg16
    container_name: skynet-db
    environment:
      POSTGRES_DB: skynet
      POSTGRES_USER: skynet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - skynet-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-docker.io}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR-}
        PIP_INDEX_URL: ${PIP_INDEX_URL-}
    container_name: skynet-api
    ports:
      - "8000:8000"
    environment:
      - REMOTE_DB_URL=postgresql://skynet:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@db:5432/skynet
      - WORKER_CONCURRENCY=2
      - WORKER_POLL_INTERVAL=2.0
      - LOG_LEVEL=INFO
    env_file:
      - path: .env
        required: false
    depends_on:
      - db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  skynet-pgdata:

networks:
  default:
    driver: bridge
