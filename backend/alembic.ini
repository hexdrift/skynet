# Alembic config — schema versioning for skynet's pgvector Postgres.
#
# The migrate Helm Job runs `alembic upgrade head` from /app, which is the
# image's WORKDIR — script_location is therefore relative to that path.
# REMOTE_DB_URL is read from the environment by env.py, so it does NOT
# appear here as `sqlalchemy.url` (would be a leaky default).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
